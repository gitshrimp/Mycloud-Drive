name: Delete temporary APTV video

on:
  schedule:
    - cron: "59 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  delete-expired-video:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete the video after three days
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          deadline=$(date -u -d "2026-07-25T18:59:00Z" +%s)
          now=$(date -u +%s)

          if (( now < deadline )); then
            echo "The video has not expired yet."
            exit 0
          fi

          echo "Deleting the release asset and temporary playlist."

          release_id=$(curl -fL -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/$REPOSITORY/releases/tags/temporary-aptv-video" \
            | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')

          status=$(curl -L -sS -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/$REPOSITORY/releases/$release_id")

          if [[ "$status" != "204" ]]; then
            echo "Release deletion failed with HTTP status $status."
            exit 1
          fi

          git push origin :refs/tags/temporary-aptv-video

          git rm --ignore-unmatch -- \
            youtube-2oDXbFcHliM.m3u \
            .github/workflows/delete-aptv-video.yml

          if git diff --cached --quiet; then
            echo "Nothing to delete."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Delete expired APTV video"
          git push
